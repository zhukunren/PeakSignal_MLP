[pytest]
# Pytest 配置文件

# 测试文件和目录模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    slow: 标记慢速测试（需要较长时间运行）
    integration: 集成测试
    unit: 单元测试

# 测试输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=ml_trader
    --cov-report=term-missing
    --cov-report=html

# 忽略的目录
norecursedirs = .git .tox dist build *.egg experiments saved_models

# 最小测试覆盖率要求（可选，暂时注释掉）
# --cov-fail-under=70
